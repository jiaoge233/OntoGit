services:
  xiaogugit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xiaogugit
    restart: unless-stopped
    env_file:
      - .env
    environment:
      XG_ENV: ${XG_ENV:-development}
      XG_HOST: 0.0.0.0
      XG_PORT: ${XG_PORT:-8000}
    ports:
      - "${XG_PORT:-8000}:8000"
    # Linux Docker 默认没有 host.docker.internal；若 XG_INFERENCE_URL 指向宿主机上的 probability，需要此行
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os,sys,urllib.request; port=os.environ.get('XG_PORT','8000'); urllib.request.urlopen(f'http://127.0.0.1:{port}/health'); sys.exit(0)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
