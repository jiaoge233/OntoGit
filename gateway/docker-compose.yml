services:
  gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
        GOSUMDB: ${GOSUMDB:-sum.golang.google.cn}
    container_name: data-infra-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GATEWAY_ADDR: :8080
      GATEWAY_XIAOGUGIT_URL: ${GATEWAY_XIAOGUGIT_URL:-http://host.docker.internal:8000}
      GATEWAY_PROBABILITY_URL: ${GATEWAY_PROBABILITY_URL:-http://host.docker.internal:5000}
      GATEWAY_AGENT_DIR: /app/agent
      GATEWAY_MYSQL_DSN: ${GATEWAY_MYSQL_DSN:-root:123456@tcp(host.docker.internal:3306)/app?parseTime=true&charset=utf8mb4&loc=Local}
      TZ: Asia/Shanghai
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
